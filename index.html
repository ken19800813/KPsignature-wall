<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柯文哲清清白白簽名展示牆</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/kendesign.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body class="kd-app-glass-v5 free-mode">
    <div class="kd-wall-v6-container">
        <main class="kd-flex-1 kd-flex-col">
            <section class="kd-wall-header kd-wall-header-v6">
                <div class="kd-view-toggle-wrap">
                    <button id="btn-autoplay-scroll" class="kd-btn-view-toggle">
                        <span class="material-icons">swap_vert</span>
                        自動滑動
                    </button>
                    <button id="btn-autoplay-carousel" class="kd-btn-view-toggle">
                        <span class="material-icons">view_carousel</span>
                        輪播模式
                    </button>
                    <button id="btn-toggle-view" class="kd-btn-view-toggle">
                        <span class="material-icons">dashboard</span>
                        切換排列模式
                    </button>
                </div>
                <h2 class="kd-v6-title kd-m-bottom-8">柯文哲<span class="kd-unlock-char" data-char="清">清</span><span class="kd-unlock-char" data-char="清">清</span><span class="kd-unlock-char" data-char="白">白</span><span class="kd-unlock-char" data-char="白">白</span></h2>
                <h2 id="wall-title" class="kd-wall-subtitle">自由貼上的 挺阿北簽名牆</h2>
                <div class="kd-wall-decoration-line"></div>
                <p class="kd-v6-item-label">Signature Wall</p>
            </section>

            <!-- Search Section -->
            <section class="kd-search-container">
                <div class="kd-search-input-wrap">
                    <span class="material-icons">person</span>
                    <input type="text" id="search-name" class="kd-search-input" placeholder="搜尋姓名...">
                </div>
                <div class="kd-search-input-wrap">
                    <span class="material-icons">tag</span>
                    <input type="text" id="search-no" class="kd-search-input" placeholder="搜尋編號...">
                </div>
                <button id="btn-search" class="kd-search-btn">
                    <span class="material-icons">search</span>
                    尋找簽名
                </button>
            </section>

            <div id="wall-viewport" class="kd-free-wall-viewport">
                <div id="wall-scale-wrapper">
                    <div id="wall-content" class="kd-free-wall-content">
                        <!-- Dynamically rendered cards -->
                        <div id="signature-wall"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Refined Floating Control Bar -->
        <div class="kd-wall-footer-refined">
            <!-- Zoom Slider (Acts as scale for the whole wall) -->
            <div class="kd-zoom-slider-wrap">
                <span class="material-icons">zoom_out</span>
                <input type="range" id="zoom-slider" class="kd-range-input" min="10" max="150" value="40">
                <span class="material-icons">zoom_in</span>
            </div>
            
            <!-- Compact Action Button -->
            <a href="signature.html" class="kd-btn-sign-pill">
                <span class="material-icons">draw</span>
                我也要簽名
            </a>
        </div>
    </div>

    <!-- Logic -->
    <script src="js/signature_wall.js"></script>
</body>
</html>
