<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柯文哲清清白白簽名展示牆</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/kendesign.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body class="kd-app-glass-v5">
    <div class="kd-wall-v6-container kd-wall-v6-padding">



        <main class="kd-flex-1">
            <section class="kd-wall-header kd-wall-header-v6">
                <h2 class="kd-v6-title kd-m-bottom-8">柯文哲<span class="kd-unlock-char" data-char="清">清</span><span class="kd-unlock-char" data-char="清">清</span><span class="kd-unlock-char" data-char="白">白</span><span class="kd-unlock-char" data-char="白">白</span></h2>
                <h2>我挺阿北簽名展示牆</h2>
                <div class="kd-wall-decoration-line"></div>
                <p class="kd-v6-item-label">Signature Gallery</p>
            </section>

            <!-- Search Section -->
            <section class="kd-search-container">
                <div class="kd-search-input-wrap">
                    <span class="material-icons">person</span>
                    <input type="text" id="search-name" class="kd-search-input" placeholder="搜尋姓名...">
                </div>
                <div class="kd-search-input-wrap">
                    <span class="material-icons">tag</span>
                    <input type="text" id="search-no" class="kd-search-input" placeholder="搜尋編號...">
                </div>
                <button id="btn-search" class="kd-search-btn">
                    <span class="material-icons">search</span>
                    尋找簽名
                </button>
            </section>

            <!-- Signature Grid -->
            <section id="signature-wall" class="kd-signature-wall-dense kd-wall-grid-padding">
                <!-- Dynamically rendered -->
            </section>
        </main>

        <!-- Refined Floating Control Bar -->
        <div class="kd-wall-footer-refined">
            <!-- Zoom Slider -->
            <div class="kd-zoom-slider-wrap">
                <span class="material-icons">photo_size_select_small</span>
                <input type="range" id="zoom-slider" class="kd-range-input" min="100" max="800" value="350">
                <span class="material-icons">photo_size_select_large</span>
            </div>
            
            <!-- Compact Action Button -->
            <a href="signature.html" class="kd-btn-sign-pill">
                <span class="material-icons">draw</span>
                我要簽名
            </a>
        </div>
    </div>

    <!-- Logic -->
    <script src="js/signature_wall.js"></script>
</body>
</html>
