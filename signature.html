<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>柯文哲清清白白 我挺阿北線上簽名活動</title>
    <!-- Noto Sans for extreme clarity -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/kendesign.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body class="kd-app-glass-v5">
    <div class="kd-sig-v6-wrapper">
        <header class="kd-header kd-header-v6">
            <a href="index.html" class="kd-back-btn">
                <span class="material-icons">chevron_left</span>
            </a>
            <h1 class="kd-header-title">我挺阿北 線上簽名板</h1>
        </header>

        <main class="kd-flex-1 kd-flex-col kd-align-center kd-justify-center kd-p-20 kd-sig-main-content">
            <!-- Sticker Picker (Hidden by default) -->
            <div id="sticker-picker" class="kd-sticker-picker">
                <!-- Dynamically filled by StickerAssetManager -->
                <div class="kd-wall-loading" style="grid-column: 1/-1; padding: 20px;"><p>載入中...</p></div>
            </div>
            <!-- Brush Settings - Premium Floating Bar -->
            <div class="kd-signature-settings-v6 kd-m-bottom-20 kd-flex kd-align-center kd-justify-center kd-gap-16">
                <!-- Group 1: Width & Color -->
                <div class="kd-flex kd-align-center kd-gap-16">
                    <div class="kd-setting-group">
                        <span class="kd-setting-label kd-text-primary">寬度</span>
                        <input type="range" id="brush-size" class="kd-range-input kd-w-80" min="1" max="12" value="4">
                    </div>
                    <div class="kd-setting-group">
                        <div class="kd-color-picker-wrap">
                            <input type="color" id="brush-color" class="kd-input-color-v6" value="#1B3969">
                            <span id="color-hex" class="kd-color-hex-label-v6">#1B3969</span>
                        </div>
                    </div>
                </div>

                <!-- Vertical Divider (Visual only) -->
                <div class="kd-divider"></div>

                <!-- Group 2: Tools (Undo, Eraser, Sticker) -->
                <div class="kd-flex kd-gap-8">
                    <button id="undo-btn" class="kd-btn-mini kd-flex-center kd-btn-tool" title="復原">
                        <span class="material-icons">undo</span>
                    </button>
                    <button id="eraser-btn" class="kd-btn-mini kd-flex-center kd-btn-tool" title="橡皮擦">
                        <span class="material-icons">auto_fix_normal</span>
                    </button>
                    <button id="sticker-toggle" class="kd-btn-mini kd-flex-center kd-btn-tool" title="貼圖">
                        <span class="material-icons">face</span>
                    </button>
                    <button id="photo-btn" class="kd-btn-mini kd-flex-center kd-btn-tool" title="上傳照片">
                        <span class="material-icons">photo_camera</span>
                    </button>
                    <input type="file" id="photo-upload" accept="image/*" style="display: none;">
                </div>
            </div>

            <!-- THE 4:3 CANVAS CONTAINER - STRICT -->
            <div class="kd-canvas-absolute-43">
                <canvas id="signature-canvas"></canvas>
                <div class="kd-canvas-watermark">柯文哲清清白白</div>
            </div>

            <!-- Name Input Field -->
            <div class="kd-name-input-wrap kd-m-top-15">
                <span class="material-icons">person</span>
                <input type="text" id="guest-name" class="kd-glass-input" placeholder="請輸入您的姓名" maxlength="20">
            </div>
            <p class="kd-v6-item-label kd-m-top-10 kd-v6-item-label-spaced">SIGN ABOVE / 請在上方區域提筆</p>

            
        </main>

        <!-- Anchored Footer -->
        <footer class="kd-p-20 kd-m-bottom-20 kd-w-100 kd-max-w-500 kd-self-center">
            <div class="kd-signature-controls kd-signature-controls-v6">
                <button id="clear-btn" class="kd-btn-glass kd-flex-1 kd-btn-radius-20">
                    <span class="material-icons kd-opacity-50">refresh</span>
                    重寫
                </button>
                <button id="save-btn" class="kd-btn-glass primary kd-flex-1 kd-btn-radius-20">
                    <span class="material-icons">check_circle</span>
                    確認送出
                </button>
            </div>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="kd-loading-overlay kd-invisible">
        <div class="kd-spinner"></div>
        <p>正在上傳至雲端...</p>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="kd-modal-overlay kd-invisible">
        <div class="kd-modal-v6">
            <div class="kd-modal-header">
                <span class="material-icons">warning</span>
                <h3>溫馨提醒</h3>
            </div>
            <div class="kd-modal-content">
                此為提供民眾黨支持者留言的空間，請理性留言，若您堅持留下不雅言論或非事實的造謠言論，一律報警處理，決不寬容
            </div>
            <div class="kd-modal-footer">
                <button id="modal-cancel" class="kd-btn-modal-secondary">再檢查一下</button>
                <button id="modal-confirm" class="kd-btn-modal-primary">我已閱讀並確認</button>
            </div>
        </div>
    </div>

    <!-- Interactive Placement Screen -->
    <div id="placement-screen" class="kd-placement-overlay kd-invisible">
        <header class="kd-placement-header">
            <h3>選擇張貼位置</h3>
            <p>請拖曳您的簽名（藍色框框）到您喜歡的位置，然後點擊確認。</p>
        </header>
        <div id="placement-viewport" class="kd-free-wall-viewport">
            <div id="placement-content" class="kd-free-wall-content">
                <div id="placement-wall-bg"></div>
                <!-- User Signature Preview -->
                <div id="user-sig-preview" class="kd-sig-card-free kd-user-sig-active">
                    <div class="kd-sig-number">New</div>
                    <img src="" id="user-sig-preview-img" class="kd-sig-img" alt="Your Signature">
                    <div class="kd-sig-meta-v2">
                        <span class="kd-sig-name" id="user-sig-preview-name">您的名字</span>
                    </div>
                </div>
            </div>
        </div>
        <footer class="kd-placement-footer">
            <button id="placement-cancel" class="kd-btn-glass kd-flex-1">
                <span class="material-icons">chevron_left</span>
                返回修改
            </button>
            <button id="placement-auto" class="kd-btn-glass kd-flex-1">
                <span class="material-icons">auto_awesome</span>
                系統自動擺放
            </button>
            <button id="placement-confirm" class="kd-btn-glass primary kd-flex-1">
                <span class="material-icons">check_circle</span>
                確認張貼
            </button>
        </footer>
    </div>

    <!-- Marquee Footer -->
    <div class="kd-marquee-footer">
        <div class="kd-marquee-content">
            「非支持者發言請理性並注意措辭，溫馨提醒，系統是會記錄您發來的資料的。柯文哲清清白白，台灣需要的是和諧共存，冥禁洞不會永遠執政」
        </div>
    </div>

    <!-- Logic -->
    <script src="js/signature.js"></script>
</body>
</html>
